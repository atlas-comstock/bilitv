<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BiliTV - Channel Surf</title>
  <style>
    html,body,#app{height:100%;margin:0;font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial}
    #app{display:flex}
    #guide{width:300px;background:#111;color:#eee;padding:8px;overflow:auto}
    #guide.hidden{display:none}
    .channel{padding:8px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer}
    .channel.active{background:#222}
    .num{font-weight:bold;margin-right:8px}
    #player{flex:1;background:#000;display:flex;align-items:center;justify-content:center;position:relative}
    #player iframe{width:100%;height:100%;min-height:360px;border:0}
    .meta{position:absolute;top:8px;left:8px;color:#fff;z-index:2;background:rgba(0,0,0,0.5);padding:6px;border-radius:4px;display:flex;align-items:center}
    #hint{position:fixed;bottom:8px;left:8px;color:#fff;z-index:10;background:rgba(0,0,0,0.4);padding:6px;border-radius:6px;font-size:13px}
    #importForm input, #importForm textarea{width:100%;box-sizing:border-box}
    #channelsList{margin-top:8px}
  </style>
</head>
<body>
  <div id="app">
    <aside id="guide">
      <div style="padding:6px;display:flex;gap:8px;align-items:center;">
        <button id="importBtn">导入 (I)</button>
        <a href="/remote.html" target="_blank" style="color:#9cf">远程控制</a>
      </div>
      <div id="importForm" style="display:none;padding:8px;border-top:1px solid rgba(255,255,255,0.04);">
        <input id="importName" placeholder="频道名称" style="margin-bottom:6px;" />
        <textarea id="importArea" placeholder="粘贴 BV 号或视频 URL（每行一个）" style="height:90px;"></textarea>
        <div style="text-align:right;margin-top:6px"><button id="importSubmit">导入</button></div>
      </div>
      <div id="channelsList"></div>
    </aside>
    <main id="player"></main>
  </div>
  <div id="hint">键盘: ↑/↓ 切频道 · ←/→ 切上下集 · G 切换指南 · I 打开导入</div>
  <script src="/app.js"></script>
</body>
</html>
